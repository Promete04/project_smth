<div cdkDrag class="border-purple-700/50 bg-purple-600/60 border w-fit h-fit p-4 rounded-xl shadow-lg cursor-grab m-4 ">
    <p><strong>{{ip()}}</strong></p>
    <div class="p-4 grid grid-cols-{{services.length / 2}}">
        @for(service of services; track service.port){
            <app-service 
                port={{service.port}} 
                name={{service.name}} 
                status={{service.status}}>
            </app-service>
        }
    </div>
</div>
